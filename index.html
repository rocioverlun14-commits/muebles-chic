const parseFecha = f => {
  if(!f) return new Date(0);
  const p = String(f).split("/");
  const d = parseInt(p[0],10)||1, m = parseInt(p[1],10)||1;
  const y = p[2] ? (parseInt(p[2],10)<100 ? 2000+parseInt(p[2],10) : parseInt(p[2],10)) : 2026;
  return new Date(y,m-1,d);
};
const mesIndex = f => { const d=parseFecha(f); return d.getTime()===0?null:d.getMonth(); };

const gradColor = t => {
  const li=[210,228,170], dk=[45,58,20];
  const r=Math.round(li[0]+(dk[0]-li[0])*t), g=Math.round(li[1]+(dk[1]-li[1])*t), b=Math.round(li[2]+(dk[2]-li[2])*t);
  return "rgb("+r+","+g+","+b+")";
};
const gradText = t => t>0.55 ? B.crema : B.verdeOsc;
const tForVal  = (v,mn,mx) => mx===mn ? 0.5 : Math.max(0,Math.min(1,(v-mn)/(mx-mn)));

function calcMeses(pedidos){
  const porMes = MESES.map((_,i)=>pedidos.filter(p=>mesIndex(p.fecha)===i).reduce((a,p)=>a+(Number(p.ganancia)||0),0));
  const vals = porMes.filter(v=>v>0);
  return { porMes, maxV: vals.length?Math.max(...vals):1, minV: vals.length?Math.min(...vals):0 };
}

// ══════════════════════════════════════════════════════════
//  Lectura via JSONP (evita CORS)
// ══════════════════════════════════════════════════════════
function jsonpGet(){
  return new Promise((resolve,reject)=>{
    const cb = "mc_cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    const s  = document.createElement("script");
    const to = setTimeout(()=>{ cleanup(); reject(new Error("timeout")); }, 15000);
    function cleanup(){ clearTimeout(to); try{ delete window[cb]; }catch{} if(s.parentNode) s.parentNode.removeChild(s); }
    window[cb] = data => { cleanup(); resolve(data); };
    s.onerror = () => { cleanup(); reject(new Error("script error")); };
    s.src = GS_URL + "?callback=" + cb + "&t=" + Date.now();
    document.body.appendChild(s);
  });
}

// ══════════════════════════════════════════════════════════
//  Escritura via formulario oculto (evita CORS)
// ══════════════════════════════════════════════════════════
function formPost(data){
  return new Promise(resolve=>{
    const name = "mc_frame_" + Date.now();
    const ifr  = document.createElement("iframe");
    ifr.name = name; ifr.style.display = "none";
    document.body.appendChild(ifr);

    const f = document.createElement("form");
    f.method = "POST"; f.action = GS_URL; f.target = name;
    f.style.display = "none";
    const i = document.createElement("input");
    i.type = "hidden"; i.name = "data"; i.value = JSON.stringify(data);
    f.appendChild(i);
    document.body.appendChild(f);

    const limpiar = () => {
      setTimeout(()=>{ try{ f.remove(); ifr.remove(); }catch{} }, 500);
      resolve();
    };
    ifr.onload = limpiar;
    setTimeout(limpiar, 12000);
    f.submit();
  });
}

function App(){
  const [tab,setTab]         = useState("inicio");
  const [pedidos,setPedidos] = useState(null);
  const [split,setSplit]     = useState(DEFAULT_SPLIT);
  const [editing,setEditing] = useState(null);
  const [loaded,setLoaded]   = useState(false);
  const [sync,setSync]       = useState("cargando"); // cargando | ok | error | guardando
  const first = useRef(true);

  // Cargar
  useEffect(()=>{
    (async()=>{
      let cargado = null, conectado = false;
      try{
        const obj = await jsonpGet();
        conectado = true;
        if(obj && Array.isArray(obj.pedidos) && obj.pedidos.length){ cargado = obj; }
        else if(Array.isArray(obj) && obj.length){ cargado = {pedidos:obj, split:DEFAULT_SPLIT}; }
      }catch(err){ conectado = false; }

      setSync(conectado ? (cargado ? "ok" : "vacio") : "error");

      if(cargado){
        setPedidos(cargado.pedidos);
        if(cargado.split) setSplit(cargado.split);
      }else{
        try{
          const local = localStorage.getItem("mc_data");
          if(local){ const d=JSON.parse(local); setPedidos(d.pedidos||SEED); if(d.split) setSplit(d.split); }
          else setPedidos(SEED);
        }catch{ setPedidos(SEED); }
      }
      setLoaded(true);
    })();
  },[]);

  // Guardar
  useEffect(()=>{
    if(!loaded||!pedidos) return;
    if(first.current){ first.current=false; return; }
    const data = {pedidos,split};
    try{ localStorage.setItem("mc_data", JSON.stringify(data)); }catch{}
    setSync("guardando");
    (async()=>{
      try{
        await formPost(data);
        await new Promise(r=>setTimeout(r,1200));
        const obj = await jsonpGet();
        const n = obj && Array.isArray(obj.pedidos) ? obj.pedidos.length : -1;
        setSync(n === pedidos.length ? "ok" : "error");
      }catch{ setSync("error"); }
    })();
  },[pedidos,split,loaded]);

  if(!pedidos) return <div style={{display:"flex",height:"100%",alignItems:"center",justifyContent:"center",background:B.crema,color:B.verde,fontFamily:"Georgia,serif",fontSize:16}}>Cargando...</div>;

  const guardar = p => { setPedidos(prev=>prev.some(x=>x.id===p.id)?prev.map(x=>x.id===p.id?p:x):[p,...prev]); setEditing(null); };
  const borrar  = id => { setPedidos(prev=>prev.filter(x=>x.id!==id)); setEditing(null); };
  const {porMes,maxV,minV} = calcMeses(pedidos);

  const syncTxt = {cargando:"Conectando...",guardando:"Guardando...",ok:"Guardado en Drive",vacio:"Conectado (Sheet vacio)",error:"Sin conexion (local)"}[sync];
  const syncCol = (sync==="error"||sync==="vacio") ? "#e8b4b4" : "rgba(255,255,255,0.6)";

  return (
    <div style={S.app}>
      <div style={S.header}>
        <div style={S.logoRow}>
          <div style={S.logoBadge}>MC</div>
          <div style={{flex:1}}>
            <div style={S.logoText}>MUEBLES <span style={{color:B.crema,fontWeight:400}}>CHIC</span></div>
            <div style={{...S.logoSub,display:"flex",alignItems:"center",gap:5,color:syncCol}}>
              <IcoCloud size={11} w={2.2} color={syncCol}/> {syncTxt}
            </div>
          </div>
        </div>
      </div>

      <div style={S.body}>
        {tab==="inicio"    && <Inicio    pedidos={pedidos} setPedidos={setPedidos} split={split} onIr={setTab} porMes={porMes} maxV={maxV} minV={minV}/>}
        {tab==="pedidos"   && <Pedidos   pedidos={pedidos} onNuevo={()=>setEditing(nuevoPedido())} onEditar={setEditing}/>}
        {tab==="ganancias" && <Ganancias pedidos={pedidos} split={split} setSplit={setSplit} porMes={porMes} maxV={maxV} minV={minV}/>}
        {tab==="calc"      && <CalcPrecio onCrearPedido={d=>setEditing({...nuevoPedido(),...d})}/>}
      </div>

      <div style={S.nav}>
        {[["inicio",IcoHome,"Inicio"],["pedidos",IcoList,"Pedidos"],["ganancias",IcoMoney,"Ganancias"],["calc",IcoCalc,"Precio"]].map(([k,Icon,label])=>(
          <button key={k} onClick={()=>setTab(k)} style={{...S.navBtn,color:tab===k?B.crema:B.verdeClaro,borderTop:tab===k?"3px solid "+B.crema:"3px solid transparent"}}>
            <Icon size={21} w={tab===k?2.5:1.8}/>
            <span style={{fontSize:10.5,marginTop:3,fontWeight:tab===k?700:500,letterSpacing:0.3}}>{label}</span>
          </button>
        ))}
      </div>

      {editing && <FormPedido pedido={editing} onGuardar={guardar} onBorrar={borrar} onCerrar={()=>setEditing(null)}/>}
    </div>
  );
}

function DatePicker({value,onChange}){
  const [open,setOpen] = useState(false);
  const parsed = (()=>{ if(!value) return {d:null,m:null,y:2026};
    const p=String(value).split("/");
    return {d:parseInt(p[0],10)||null,m:parseInt(p[1],10)||null,y:p[2]?(parseInt(p[2],10)<100?2000+parseInt(p[2],10):parseInt(p[2],10)):2026}; })();
  const today = new Date();
  const [viewM,setViewM] = useState(parsed.m?parsed.m-1:today.getMonth());
  const [viewY,setViewY] = useState(parsed.y||today.getFullYear());
  const daysInM = new Date(viewY,viewM+1,0).getDate();
  const offset  = (new Date(viewY,viewM,1).getDay()+6)%7;
  const prevM = ()=> viewM===0?(setViewM(11),setViewY(y=>y-1)):setViewM(m=>m-1);
  const nextM = ()=> viewM===11?(setViewM(0),setViewY(y=>y+1)):setViewM(m=>m+1);

  return (<>
    <button type="button" onClick={()=>setOpen(true)} style={{...S.inp,textAlign:"left",cursor:"pointer",color:value?B.texto:B.textoSuave,display:"flex",alignItems:"center",gap:8}}>
      <IcoCal size={15} w={2} color={B.verdeClaro}/><span>{value||"Seleccionar fecha"}</span>
    </button>
    {open && (
      <div style={{position:"fixed",inset:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}} onClick={()=>setOpen(false)}>
        <div style={{background:B.blanco,borderRadius:22,padding:20,width:"100%",maxWidth:330,boxShadow:"0 12px 40px rgba(0,0,0,0.25)"}} onClick={e=>e.stopPropagation()}>
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
            <button type="button" onClick={prevM} style={S.calNav}>&#8249;</button>
            <span style={{fontWeight:800,color:B.verde,fontSize:16,fontFamily:"Georgia,serif"}}>{MESES_L[viewM]} {viewY}</span>
            <button type="button" onClick={nextM} style={S.calNav}>&#8250;</button>
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:6}}>
            {DIAS_S.map(d=><div key={d} style={{textAlign:"center",fontSize:11,fontWeight:700,color:B.textoSuave,padding:"3px 0"}}>{d}</div>)}
          </div>
          <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>
            {Array(offset).fill(null).map((_,i)=><div key={"e"+i}/>)}
            {Array(daysInM).fill(null).map((_,i)=>{
              const d=i+1;
              const sel = parsed.d===d && parsed.m===viewM+1;
              const isTod = today.getDate()===d&&today.getMonth()===viewM&&today.getFullYear()===viewY;
              return <button key={d} type="button" onClick={()=>{onChange(d+"/"+(viewM+1));setOpen(false);}}
                style={{padding:"10px 2px",border:"none",borderRadius:10,cursor:"pointer",fontSize:14,
                  fontWeight:sel||isTod?700:400,
                  background:sel?B.verde:isTod?B.cremaMed:"transparent",

function Diagnostico({pedidos,split}){
  const [res,setRes] = useState("");
  const [ver,setVer] = useState(false);

  const probar = async () => {
    setRes("Consultando el Sheet...");
    try{
      const obj = await jsonpGet();
      const n = obj && Array.isArray(obj.pedidos) ? obj.pedidos.length : 0;
      const crudo = JSON.stringify(obj).slice(0,180);
      setRes("LECTURA OK\nPedidos en el Sheet: " + n + "\nContenido: " + crudo);
    }catch(err){
      setRes("ERROR DE LECTURA\n" + (err && err.message ? err.message : "desconocido"));
    }
  };

  const escribir = async () => {
    setRes("VERSION: formPost v3\nEnviando " + pedidos.length + " pedidos al Sheet...");
    try{
      await formPost({pedidos,split});
      setRes(r => r + "\nEnvio despachado. Esperando 3 seg...");
      await new Promise(r=>setTimeout(r,3000));
      const obj = await jsonpGet();
      const n = obj && Array.isArray(obj.pedidos) ? obj.pedidos.length : 0;
      setRes("VERSION: formPost v3\nEnviados: " + pedidos.length +
             "\nAhora hay en el Sheet: " + n +
             (n===pedidos.length ? "\n\nESCRITURA OK" : "\n\nLA ESCRITURA NO LLEGO"));
    }catch(err){
      setRes("ERROR AL ESCRIBIR\n" + (err && err.message ? err.message : "desconocido"));
    }
  };

  return (
    <div style={{marginBottom:18}}>
      <button onClick={()=>setVer(v=>!v)} style={{background:"none",border:"none",color:B.textoSuave,fontSize:11.5,fontWeight:700,cursor:"pointer",padding:"2px 0",textDecoration:"underline"}}>
        {ver ? "Ocultar diagnostico" : "Ver diagnostico de sincronizacion"}
      </button>
      {ver && (
        <div style={{background:B.blanco,border:"1px solid "+B.cremaOsc,borderRadius:14,padding:14,marginTop:8}}>
          <button onClick={probar} style={{width:"100%",background:B.verde,color:B.crema,border:"none",padding:"10px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer"}}>Probar lectura</button>
          <button onClick={escribir} style={{width:"100%",marginTop:8,background:B.verdeMed,color:B.crema,border:"none",padding:"10px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer"}}>Probar escritura</button>
          {res && <pre style={{whiteSpace:"pre-wrap",wordBreak:"break-all",fontSize:11,color:B.texto,background:B.crema,padding:10,borderRadius:8,marginTop:10,marginBottom:0,fontFamily:"monospace"}}>{res}</pre>}
        </div>
      )}
    </div>
  );
}

function Pedidos({pedidos,onNuevo,onEditar}){
  const [q,setQ]=useState(""), [filtro,setFiltro]=useState("Todos"), [tallerF,setTallerF]=useState("Todos");
  const filtrados = [...pedidos].filter(p=>{
    const txt=(p.nombre+" "+p.pedido+" "+p.direccion+" "+p.taller).toLowerCase();
    const mQ=txt.includes(q.toLowerCase());
    const mF=filtro==="Todos"||(filtro==="Por entregar"?normE(p.estado)!=="Entregado":normE(p.estado)===filtro);
    const mT=tallerF==="Todos"||p.taller===tallerF;
    return mQ&&mF&&mT;
  }).sort((a,b)=>parseFecha(b.fecha)-parseFecha(a.fecha));

  return (
    <div style={S.scroll}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <p style={{...S.secTitle,margin:0}}>Pedidos</p>
        <button onClick={onNuevo} style={S.addBtn}><IcoPlus size={16} w={2.5}/> Nuevo</button>
      </div>
      <div style={S.searchBox}>
        <IcoSearch size={16} w={2} color={B.textoSuave}/>
        <input value={q} onChange={e=>setQ(e.target.value)} placeholder="Buscar cliente, pedido..." style={S.searchInput}/>
      </div>
      <div style={{display:"flex",gap:7,overflowX:"auto",marginBottom:8,paddingBottom:2}}>
        {["Todos","Por entregar","Pendiente","Confeccion","Entregado"].map(f=>(
          <button key={f} onClick={()=>setFiltro(f)} style={{...S.chip,background:filtro===f?B.verde:B.cremaMed,color:filtro===f?B.crema:B.verdeMed}}>{f}</button>
        ))}
      </div>
      <div style={{display:"flex",alignItems:"center",gap:7,overflowX:"auto",marginBottom:14,paddingBottom:2}}>
        <span style={{fontSize:12,color:B.textoSuave,fontWeight:700,whiteSpace:"nowrap"}}>Taller:</span>
        {["Todos",...TALLERES].map(t=>(
          <button key={t} onClick={()=>setTallerF(t)} style={{...S.chip,background:tallerF===t?B.verdeOsc:B.cremaMed,color:tallerF===t?B.crema:B.verdeMed}}>{t}</button>
        ))}
      </div>
      {filtrados.map((p,idx)=>{
        const prev=filtrados[idx-1], pMes=mesIndex(p.fecha), prevMes=prev?mesIndex(prev.fecha):null;
        return (
          <div key={p.id}>
            {pMes!==null && pMes!==prevMes && (
              <div style={{fontSize:12,fontWeight:800,color:B.verdeClaro,textTransform:"uppercase",letterSpacing:1,padding:"8px 2px 4px"}}>{MESES_L[pMes]}</div>
            )}
            <button onClick={()=>onEditar(p)} style={S.pedCard}>
              <div style={{flex:1,textAlign:"left"}}>
                <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                  <span style={{fontWeight:700,fontSize:15,color:B.texto}}>{p.nombre}</span>
                  <Badge estado={p.estado}/>
                </div>
                <div style={{fontSize:12.5,color:B.textoSuave,marginBottom:3}}>{p.pedido}</div>
                <div style={{fontSize:11.5,color:B.cremaOsc}}>{p.fecha} · {p.direccion} · {p.taller}</div>
                <div style={{display:"flex",gap:14,marginTop:6}}>
                  <span style={{fontSize:12.5,color:B.texto}}><b>{fmt(p.total)}</b> <span style={{color:B.textoSuave}}>venta</span></span>
                  <span style={{fontSize:12.5,color:B.verdeMed}}><b>{fmt(p.ganancia)}</b> <span style={{color:B.textoSuave}}>ganas</span></span>
                </div>
              </div>
              <IcoChev size={18} w={2} color={B.cremaOsc}/>
            </button>
          </div>
        );
      })}
      {filtrados.length===0 && <p style={{color:B.textoSuave,fontSize:14}}>No hay pedidos que coincidan.</p>}
    </div>
  );
}

// ══════════════════════════════════════════════════════════
function Fld({label,children}){
  return <label style={{display:"block",marginBottom:12}}>
    <span style={{fontSize:12,fontWeight:700,color:B.verdeMed,display:"block",marginBottom:5,textTransform:"uppercase",letterSpacing:0.5}}>{label}</span>
    {children}</label>;
}

function FormPedido({pedido,onGuardar,onBorrar,onCerrar}){
  const [p,setP]=useState({...pedido,costos:pedido.costos||{}});
  const set=(k,v)=>setP(x=>({...x,[k]:v}));
  const setC=(k,v)=>setP(x=>({...x,costos:{...x.costos,[k]:v}}));
  const sumaP=COSTOS.reduce((a,[k])=>a+(Number(p.costos[k])||0),0);
  const restoSug=(Number(p.total)||0)-(Number(p.senas)||0);

  return (
    <div style={S.modalBg} onClick={onCerrar}>
      <div style={S.modal} onClick={e=>e.stopPropagation()}>
        <div style={S.modalHead}>
          <span style={{fontWeight:700,fontSize:17,color:B.verde,fontFamily:"Georgia,serif"}}>{pedido.nombre?"Editar pedido":"Nuevo pedido"}</span>
          <button onClick={onCerrar} style={{background:B.cremaMed,border:"none",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:B.verdeMed}}><IcoX size={20} w={2}/></button>
        </div>
        <div style={S.modalBody}>
          <div style={S.grid2}>
            <Fld label="Fecha"><DatePicker value={p.fecha} onChange={v=>set("fecha",v)}/></Fld>
            <Fld label="Taller"><select style={S.inp} value={p.taller} onChange={e=>set("taller",e.target.value)}>{TALLERES.map(t=><option key={t}>{t}</option>)}</select></Fld>
          </div>
          <Fld label="Cliente"><input style={S.inp} value={p.nombre} onChange={e=>set("nombre",e.target.value)}/></Fld>
          <Fld label="Direccion"><input style={S.inp} value={p.direccion} onChange={e=>set("direccion",e.target.value)}/></Fld>
          <Fld label="Pedido"><textarea style={{...S.inp,minHeight:58,resize:"vertical"}} value={p.pedido} onChange={e=>set("pedido",e.target.value)}/></Fld>
          <Fld label="Telas / materiales"><textarea style={{...S.inp,minHeight:44,resize:"vertical"}} value={p.telas} onChange={e=>set("telas",e.target.value)}/></Fld>
          <Fld label="Estado">
            <div style={{display:"flex",gap:8}}>
              {ESTADOS.map(e=>{ const c=E_COLOR[e]; const on=normE(p.estado)===e; return (
                <button key={e} onClick={()=>set("estado",e)} style={{flex:1,padding:"8px 0",borderRadius:10,border:"1.5px solid "+(on?c.dot:B.cremaOsc),background:on?c.bg:B.crema,color:on?c.fg:B.textoSuave,fontSize:12.5,fontWeight:on?700:500,cursor:"pointer"}}>{e}</button>
              );})}
            </div>
          </Fld>
          <div style={S.grid2}>
            <Fld label="Total (venta)"><input type="number" style={S.inp} value={p.total} onChange={e=>set("total",e.target.value)}/></Fld>
            <Fld label="Sena"><input type="number" style={S.inp} value={p.senas} onChange={e=>set("senas",e.target.value)}/></Fld>
          </div>
          <div style={S.grid2}>
            <Fld label="Resto / contra entrega">
              <input type="number" style={S.inp} value={p.resto} onChange={e=>set("resto",e.target.value)}/>
              <button type="button" onClick={()=>set("resto",restoSug)} style={{marginTop:5,background:B.cremaMed,color:B.verdeMed,border:"1px solid "+B.cremaOsc,borderRadius:8,padding:"6px 8px",fontSize:11.5,fontWeight:700,cursor:"pointer",width:"100%"}}>
                Calcular: total - sena = {fmt(restoSug)}
              </button>
            </Fld>
            <Fld label="Costo total"><input type="number" style={S.inp} value={p.costo} onChange={e=>set("costo",e.target.value)}/></Fld>
          </div>
          <Fld label="Tu ganancia"><input type="number" style={{...S.inp,fontWeight:800,color:B.verdeMed}} value={p.ganancia} onChange={e=>set("ganancia",e.target.value)}/></Fld>
          <details style={{marginTop:8,background:B.crema,borderRadius:12,padding:"12px 14px",border:"1px solid "+B.cremaOsc}}>
            <summary style={{fontWeight:700,color:B.verdeMed,cursor:"pointer",fontSize:13.5}}>Detalle por proveedor</summary>
            <div style={{...S.grid2,marginTop:10}}>
              {COSTOS.map(([k,label])=>(
                <Fld key={k} label={label}><input type="number" style={S.inp} value={p.costos[k]||""} onChange={e=>setC(k,e.target.value)} placeholder="0"/></Fld>
              ))}
            </div>
            {sumaP>0 && (
              <div style={{marginTop:10,padding:12,background:B.cremaMed,borderRadius:10}}>
                <div style={{fontSize:13,color:B.textoSuave}}>Suma: <b>{fmt(sumaP)}</b> · Ganancia: <b style={{color:B.verdeMed}}>{fmt((Number(p.total)||0)-sumaP)}</b></div>
                <button onClick={()=>{set("costo",sumaP);set("ganancia",(Number(p.total)||0)-sumaP);}} style={{marginTop:8,width:"100%",background:B.verde,color:B.crema,border:"none",padding:"9px",borderRadius:10,fontWeight:700,cursor:"pointer",fontSize:13}}>Usar este costo y ganancia</button>
              </div>
            )}
          </details>
        </div>
        <div style={{display:"flex",gap:10,padding:"14px 20px",borderTop:"1px solid "+B.cremaMed}}>
          {pedido.nombre && <button onClick={()=>onBorrar(pedido.id)} style={{background:"#fde8e8",color:"#c0392b",border:"none",borderRadius:12,width:46,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer"}}><IcoTrash size={17} w={2}/></button>}
          <button onClick={()=>onGuardar(p)} style={{flex:1,background:B.verde,color:B.crema,border:"none",padding:"13px",borderRadius:12,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"Georgia,serif"}}>Guardar</button>
        </div>
      </div>
    </div>
  );
}

// ══════════════════════════════════════════════════════════
function Ganancias({pedidos,split,setSplit,porMes,maxV,minV}){
  const tot = split.ahorros+split.casa+split.personales;
  const ganTotal = pedidos.filter(p=>normE(p.estado)==="Entregado").reduce((a,p)=>a+(Number(p.ganancia)||0),0);
  const maxMes = Math.max(...porMes,1);
  const rep = {ahorros:ganTotal*(split.ahorros/100),casa:ganTotal*(split.casa/100),personales:ganTotal*(split.personales/100)};

  return (
    <div style={S.scroll}>
      <p style={{fontSize:22,fontWeight:700,color:B.verde,fontFamily:"Georgia,serif",margin:"0 0 14px"}}>Ganancias</p>
      <div style={{background:B.verde,borderRadius:16,padding:"16px 18px",marginBottom:16}}>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",fontWeight:600}}>Ganancia total (entregados)</div>
        <div style={{fontSize:28,fontWeight:800,color:B.crema,letterSpacing:-0.5,marginTop:4}}>{fmt(ganTotal)}</div>
      </div>

      <p style={S.secTitle}>Reparto</p>
      <div style={{display:"flex",flexDirection:"column",gap:10,marginBottom:8}}>
        {[["ahorros","Ahorros","#3b6cb7"],["casa","Casa","#b8860b"],["personales","Personales","#6b3b8a"]].map(([k,label,color])=>(
          <div key={k} style={{display:"flex",alignItems:"center",padding:"12px 14px",background:B.crema,border:"1px solid "+B.cremaOsc,borderRadius:14}}>
            <div style={{width:8,height:36,borderRadius:6,background:color,marginRight:12}}/>
            <div style={{flex:1}}>
              <div style={{fontWeight:700,color:B.texto,fontSize:13}}>{label}</div>
              <div style={{fontSize:17,fontWeight:800,color}}>{fmt(rep[k])}</div>
            </div>
            <div style={{display:"flex",alignItems:"center",gap:4}}>
              <input type="number" value={split[k]} onChange={e=>setSplit({...split,[k]:Number(e.target.value)})} style={{width:46,textAlign:"center",border:"1px solid "+B.cremaOsc,borderRadius:8,padding:"5px 3px",fontSize:14,fontWeight:700,color:B.verde,background:B.crema}}/>
              <span style={{color:B.textoSuave,fontWeight:700}}>%</span>
            </div>
          </div>
        ))}
      </div>
      {tot!==100 && <p style={{color:"#c0392b",fontSize:13,marginBottom:10}}>Los porcentajes suman {tot}% (deben ser 100%)</p>}

      <p style={S.secTitle}>Mes a mes</p>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {MESES.map((mes,i)=>{
          const v=porMes[i]; if(v===0) return null;
          const t=tForVal(v,minV,maxV), bg=gradColor(t), fg=gradText(t);
          const isMax=v===maxV, isMin=v===minV&&minV!==maxV;
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,borderRadius:14,padding:"12px 16px",background:bg,
              border:"2px solid "+(isMax?B.verdeOsc:isMin?"rgba(255,255,255,0.5)":"transparent")}}>
              <div style={{width:50,fontWeight:800,color:fg,fontSize:14}}>{mes}</div>
              <div style={{flex:1,height:7,background:"rgba(255,255,255,0.25)",borderRadius:8,overflow:"hidden"}}>
                <div style={{width:(v/maxMes*100)+"%",height:"100%",background:"rgba(255,255,255,0.5)",borderRadius:8}}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {isMax && <span style={{fontSize:10,fontWeight:800,background:"rgba(255,255,255,0.3)",color:fg,padding:"2px 7px",borderRadius:10}}>MAX</span>}
                {isMin && <span style={{fontSize:10,fontWeight:800,background:"rgba(0,0,0,0.15)",color:fg,padding:"2px 7px",borderRadius:10}}>MIN</span>}
                <div style={{minWidth:130,textAlign:"right",fontWeight:800,color:fg,fontSize:14.5}}>{fmt(v)}</div>
              </div>
            </div>
          );
        })}
      </div>
    </div>
  );
}

function CalcPrecio({onCrearPedido}){
  const [d,setD]=useState({material:"",combustible:"",otros:"",hM:1,hI:1,hC:1,hora:5000,margen:40});
  const set=(k,v)=>setD(x=>({...x,[k]:v}));
  const n=k=>Number(d[k])||0;
  const costoT=(n("hM")+n("hI")+n("hC"))*n("hora");
  const costoR=n("material")+n("combustible")+n("otros")+costoT;
  const precio=costoR*(1+n("margen")/100);
  const gan=precio-costoR;

  return (
    <div style={S.scroll}>
      <p style={{fontSize:22,fontWeight:700,color:B.verde,fontFamily:"Georgia,serif",margin:"0 0 4px"}}>Calculadora</p>
      <p style={{color:B.textoSuave,fontSize:13,margin:"0 0 16px"}}>Para fundas, cortinas y decoracion</p>
      <div style={{background:B.crema,border:"1px solid "+B.cremaOsc,borderRadius:16,padding:"16px 16px 4px",marginBottom:14}}>
        <Fld label="Costo del material / produccion"><input type="number" style={S.inp} value={d.material} onChange={e=>set("material",e.target.value)} placeholder="0"/></Fld>
        <Fld label="Combustible"><input type="number" style={S.inp} value={d.combustible} onChange={e=>set("combustible",e.target.value)} placeholder="0"/></Fld>
        <Fld label="Otros gastos"><input type="number" style={S.inp} value={d.otros} onChange={e=>set("otros",e.target.value)} placeholder="0"/></Fld>
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
          <Fld label="Hs medicion"><input type="number" style={S.inp} value={d.hM} onChange={e=>set("hM",e.target.value)}/></Fld>
          <Fld label="Hs instalac."><input type="number" style={S.inp} value={d.hI} onChange={e=>set("hI",e.target.value)}/></Fld>
          <Fld label="Hs coord."><input type="number" style={S.inp} value={d.hC} onChange={e=>set("hC",e.target.value)}/></Fld>
        </div>
        <div style={S.grid2}>
          <Fld label="Valor tu hora"><input type="number" style={S.inp} value={d.hora} onChange={e=>set("hora",e.target.value)}/></Fld>
          <Fld label="Margen (%)"><input type="number" style={S.inp} value={d.margen} onChange={e=>set("margen",e.target.value)}/></Fld>
        </div>
      </div>
      <div style={{background:B.verde,borderRadius:16,padding:"16px 18px",marginBottom:14}}>
        {[["Costo del tiempo",fmt(costoT),false],["Costo total real",fmt(costoR),true]].map(([l,v,b])=>(
          <div key={l} style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.15)"}}>
            <span style={{color:"rgba(255,255,255,0.75)",fontSize:13,fontWeight:b?700:400}}>{l}</span>
            <span style={{color:B.crema,fontWeight:b?800:600,fontSize:b?15:13}}>{v}</span>
          </div>
        ))}
        <div style={{marginTop:12}}>
          <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
            <span style={{color:"rgba(255,255,255,0.8)",fontSize:14,fontWeight:600}}>Precio sugerido</span>
            <span style={{color:B.crema,fontWeight:800,fontSize:22,letterSpacing:-0.5}}>{fmt(precio)}</span>
          </div>
          <div style={{display:"flex",justifyContent:"space-between"}}>
            <span style={{color:"rgba(255,255,255,0.8)",fontSize:14,fontWeight:600}}>Tu ganancia</span>
            <span style={{color:"#b8f0a0",fontWeight:800,fontSize:18}}>{fmt(gan)}</span>
          </div>
        </div>
      </div>
      <button onClick={()=>onCrearPedido({total:Math.round(precio),costo:Math.round(costoR),ganancia:Math.round(gan)})}
        style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,width:"100%",background:B.crema,color:B.verde,border:"2px solid "+B.verde,padding:"13px",borderRadius:14,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"Georgia,serif"}}>
        <IcoPlus size={17} w={2.5}/> Crear pedido con este precio
      </button>
    </div>
  );
}
