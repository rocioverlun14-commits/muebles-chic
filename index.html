function parseFecha(f){
  if(!f) return new Date(0);
  var p = String(f).split("/");
  var d = parseInt(p[0],10)||1;
  var m = parseInt(p[1],10)||1;
  var y = 2026;
  if(p[2]){ y = parseInt(p[2],10); if(y < 100) y = 2000 + y; }
  return new Date(y, m-1, d);
}
function mesIndex(f){
  var d = parseFecha(f);
  return d.getTime() === 0 ? null : d.getMonth();
}

function gradColor(t){
  var li=[210,228,170], dk=[45,58,20];
  var r=Math.round(li[0]+(dk[0]-li[0])*t);
  var g=Math.round(li[1]+(dk[1]-li[1])*t);
  var b=Math.round(li[2]+(dk[2]-li[2])*t);
  return "rgb("+r+","+g+","+b+")";
}
function gradText(t){ return t > 0.55 ? B.crema : B.verdeOsc; }
function tForVal(v,mn,mx){
  if(mx === mn) return 0.5;
  var t = (v-mn)/(mx-mn);
  return t < 0 ? 0 : (t > 1 ? 1 : t);
}
function calcMeses(pedidos){
  var porMes = MESES.map(function(_,i){
    return pedidos.filter(function(p){ return mesIndex(p.fecha) === i; })
                  .reduce(function(a,p){ return a + (Number(p.ganancia)||0); }, 0);

    porMes: porMes,
    maxV: vals.length ? Math.max.apply(null, vals) : 1,
    minV: vals.length ? Math.min.apply(null, vals) : 0
  };
}

// ═══════════ SYNC ═══════════
function jsonpGet(){
  return new Promise(function(resolve,reject){
    var cb = "mc_cb_" + Date.now() + "_" + Math.floor(Math.random()*9999);
    var s  = document.createElement("script");
    var to = setTimeout(function(){ cleanup(); reject(new Error("timeout")); }, 15000);
    function cleanup(){
      clearTimeout(to);
      try{ delete window[cb]; }catch(err){ window[cb] = undefined; }
      if(s.parentNode) s.parentNode.removeChild(s);
    }
    window[cb] = function(data){ cleanup(); resolve(data); };
    s.onerror = function(){ cleanup(); reject(new Error("script error")); };
    s.src = GS_URL + "?callback=" + cb + "&t=" + Date.now();
    document.body.appendChild(s);
  });
}

function formPost(data){
  return new Promise(function(resolve){
    var name = "mc_frame_" + Date.now();
    var ifr = document.createElement("iframe");
    ifr.name = name;
    ifr.style.display = "none";
    document.body.appendChild(ifr);
    var f = document.createElement("form");
    f.method = "POST"; f.action = GS_URL; f.target = name; f.style.display = "none";
    var i = document.createElement("input");
    i.type = "hidden"; i.name = "data"; i.value = JSON.stringify(data);
    f.appendChild(i);
    document.body.appendChild(f);
    var listo = false;
    function limpiar(){
      if(listo) return;
      listo = true;
      setTimeout(function(){
        try{ if(f.parentNode) f.parentNode.removeChild(f); }catch(err){}
        try{ if(ifr.parentNode) ifr.parentNode.removeChild(ifr); }catch(err){}
      }, 800);
      resolve();
    }
    ifr.onload = limpiar;
    setTimeout(limpiar, 12000);
    f.submit();
  });
}

// ═══════════ DATE PICKER ═══════════
function DatePicker(props){
  var opS = useState(false), open = opS[0], setOpen = opS[1];
  var value = props.value;
  var pd = null, pm = null, py = 2026;
  if(value){
    var pp = String(value).split("/");
    pd = parseInt(pp[0],10) || null;
    pm = parseInt(pp[1],10) || null;
    if(pp[2]){ py = parseInt(pp[2],10); if(py < 100) py = 2000 + py; }
  }
  var today = new Date();
  var vmS = useState(pm ? pm-1 : today.getMonth()), viewM = vmS[0], setViewM = vmS[1];
  var vyS = useState(py || today.getFullYear()), viewY = vyS[0], setViewY = vyS[1];
  var daysInM = new Date(viewY, viewM+1, 0).getDate();
  var offset = (new Date(viewY, viewM, 1).getDay() + 6) % 7;

  function prevM(){ if(viewM === 0){ setViewM(11); setViewY(viewY-1); } else setViewM(viewM-1); }
  function nextM(){ if(viewM === 11){ setViewM(0); setViewY(viewY+1); } else setViewM(viewM+1); }

  var celdas = [];
  for(var e=0; e<offset; e++) celdas.push(<div key={"e"+e}/>);
  for(var d=1; d<=daysInM; d++){
    (function(dia){
      var sel = (pd === dia && pm === viewM+1);
      var isTod = (today.getDate() === dia && today.getMonth() === viewM && today.getFullYear() === viewY);
      celdas.push(
        <button key={dia} type="button" onClick={function(){ props.onChange(dia + "/" + (viewM+1)); setOpen(false); }}
          style={{padding:"10px 2px",border:"none",borderRadius:10,cursor:"pointer",fontSize:14,
            fontWeight: (sel||isTod) ? 700 : 400,
            background: sel ? B.verde : (isTod ? B.cremaMed : "transparent"),
            color: sel ? B.crema : (isTod ? B.verde : B.texto)}}>{dia}</button>
      );
    })(d);
  }

  return (
    <React.Fragment>
      <button type="button" onClick={function(){ setOpen(true); }}
        style={Object.assign({}, S.inp, {textAlign:"left",cursor:"pointer",color: value ? B.texto : B.textoSuave,display:"flex",alignItems:"center",gap:8})}>
        <IcoCal size={15} w={2} color={B.verdeClaro}/><span>{value || "Seleccionar fecha"}</span>
      </button>
      {open ? (
        <div style={{position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.5)",zIndex:300,display:"flex",alignItems:"center",justifyContent:"center",padding:16}}
          onClick={function(){ setOpen(false); }}>
          <div style={{background:B.blanco,borderRadius:22,padding:20,width:"100%",maxWidth:330,boxShadow:"0 12px 40px rgba(0,0,0,0.25)"}}
            onClick={function(ev){ ev.stopPropagation(); }}>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
              <button type="button" onClick={prevM} style={S.calNav}>&#8249;</button>
              <span style={{fontWeight:800,color:B.verde,fontSize:16,fontFamily:"Georgia,serif"}}>{MESES_L[viewM]} {viewY}</span>
              <button type="button" onClick={nextM} style={S.calNav}>&#8250;</button>
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",marginBottom:6}}>
              {DIAS_S.map(function(ds){
                return <div key={ds} style={{textAlign:"center",fontSize:11,fontWeight:700,color:B.textoSuave,padding:"3px 0"}}>{ds}</div>;
              })}
            </div>
            <div style={{display:"grid",gridTemplateColumns:"repeat(7,1fr)",gap:3}}>{celdas}</div>
            <button type="button" onClick={function(){ setOpen(false); }}
              style={{marginTop:14,width:"100%",background:B.cremaMed,color:B.verdeMed,border:"none",borderRadius:12,padding:"11px",fontWeight:700,cursor:"pointer",fontSize:14}}>Listo</button>
          </div>
        </div>
      ) : null}
    </React.Fragment>
  );
}

function Pedidos(props){
  var qS = useState(""), q = qS[0], setQ = qS[1];
  var fS = useState("Todos"), filtro = fS[0], setFiltro = fS[1];
  var tS = useState("Todos"), tallerF = tS[0], setTallerF = tS[1];
  var desk = props.desk;

  var filtrados = props.pedidos.filter(function(p){
    var txt = (p.nombre + " " + p.pedido + " " + p.direccion + " " + p.taller).toLowerCase();
    var mQ = txt.indexOf(q.toLowerCase()) > -1;
    var mF = filtro === "Todos" || (filtro === "Por entregar" ? normE(p.estado) !== "Entregado" : normE(p.estado) === filtro);
    var mT = tallerF === "Todos" || p.taller === tallerF;
    return mQ && mF && mT;
  }).sort(function(a,b){ return parseFecha(b.fecha) - parseFecha(a.fecha); });

  function tarjeta(p){
    return (
      <button key={p.id} onClick={function(){ props.onEditar(p); }} style={S.pedCard}>
        <div style={{flex:1,textAlign:"left"}}>
          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>

            <Badge estado={p.estado}/>
          </div>
          <div style={{fontSize:12.5,color:B.textoSuave,marginBottom:3}}>{p.pedido || "Sin detalle"}</div>
          <div style={{fontSize:11.5,color:B.cremaOsc}}>{p.fecha || "Sin fecha"} · {p.direccion} · {p.taller}</div>
          <div style={{display:"flex",gap:14,marginTop:6,flexWrap:"wrap"}}>
            <span style={{fontSize:12.5,color:B.texto}}><b>{fmt(p.total)}</b> <span style={{color:B.textoSuave}}>venta</span></span>
            <span style={{fontSize:12.5,color:B.verdeMed}}><b>{fmt(p.ganancia)}</b> <span style={{color:B.textoSuave}}>ganas</span></span>
            {Number(p.resto) > 0 ? <span style={{fontSize:12.5,color:"#b8860b"}}><b>{fmt(p.resto)}</b> <span style={{color:B.textoSuave}}>resta</span></span> : null}
          </div>
        </div>
        <IcoChev size={18} w={2} color={B.cremaOsc}/>
      </button>
    );
  }

  return (
    <Wrap desk={desk}>
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:14}}>
        <p style={Object.assign({}, S.secTitle, {margin:0})}>Pedidos ({filtrados.length})</p>
        <button onClick={props.onNuevo} style={S.addBtn}><IcoPlus size={16} w={2.5}/> Nuevo</button>
      </div>

      <div style={S.searchBox}>
        <IcoSearch size={16} w={2} color={B.textoSuave}/>
        <input value={q} onChange={function(e){ setQ(e.target.value); }} placeholder="Buscar cliente, pedido..." style={S.searchInput}/>
      </div>

      <div style={{display:"flex",gap:7,overflowX:"auto",marginBottom:8,paddingBottom:2}}>
        {["Todos","Por entregar","Pendiente","Confeccion","Entregado"].map(function(f){
          return <button key={f} onClick={function(){ setFiltro(f); }}
            style={Object.assign({}, S.chip, {background: filtro===f ? B.verde : B.cremaMed, color: filtro===f ? B.crema : B.verdeMed})}>{f}</button>;
        })}
      </div>

      <div style={{display:"flex",alignItems:"center",gap:7,overflowX:"auto",marginBottom:14,paddingBottom:2}}>
        <span style={{fontSize:12,color:B.textoSuave,fontWeight:700,whiteSpace:"nowrap"}}>Taller:</span>
        {["Todos"].concat(TALLERES).map(function(t){
          return <button key={t} onClick={function(){ setTallerF(t); }}
            style={Object.assign({}, S.chip, {background: tallerF===t ? B.verdeOsc : B.cremaMed, color: tallerF===t ? B.crema : B.verdeMed})}>{t}</button>;
        })}
      </div>

      {desk ? (
        <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:10}}>
          {filtrados.map(tarjeta)}

            <div key={p.id}>
              {(pMes !== null && pMes !== prevMes)
                ? <div style={{fontSize:12,fontWeight:800,color:B.verdeClaro,textTransform:"uppercase",letterSpacing:1,padding:"8px 2px 4px"}}>{MESES_L[pMes]}</div>
                : null}
              {tarjeta(p)}
            </div>
          );
        })
      )}
      {filtrados.length === 0 ? <p style={{color:B.textoSuave,fontSize:14}}>No hay pedidos que coincidan.</p> : null}
    </Wrap>
  );
}

// ═══════════ FORM PEDIDO ═══════════
function FormPedido(props){
  var init = Object.assign({}, props.pedido);
  if(!init.costos) init.costos = {};
  var pS = useState(init), p = pS[0], setP = pS[1];
  var pcS = useState(props.pctSena || 60), pct = pcS[0], setPct = pcS[1];

  function set(k,v){
    var np = Object.assign({}, p);
    np[k] = v;
    if(k === "total"){
      var tot = Number(v) || 0;
      var sena = Math.round(tot * pct / 100);
      np.senas = sena;
      np.resto = tot - sena;
    }
    if(k === "senas"){
      np.resto = (Number(p.total)||0) - (Number(v)||0);
    }
    setP(np);
  }
  function aplicarPct(nuevoPct){
    setPct(nuevoPct);
    var tot = Number(p.total) || 0;
    var sena = Math.round(tot * nuevoPct / 100);
    var np = Object.assign({}, p);
    np.senas = sena;
    np.resto = tot - sena;
    setP(np);
  }
  function setC(k,v){
    var np = Object.assign({}, p);
    np.costos = Object.assign({}, p.costos);
    np.costos[k] = v;
    setP(np);
  }

  var sumaP = 0;
  COSTOS.forEach(function(c){ sumaP += Number(p.costos[c[0]]) || 0; });
  var restoSug = (Number(p.total)||0) - (Number(p.senas)||0);
  var senaCalc = Math.round((Number(p.total)||0) * pct / 100);

  return (
    <div style={S.modalBg} onClick={props.onCerrar}>
      <div style={Object.assign({}, S.modal, props.desk ? {maxWidth:820,maxHeight:"88vh",borderRadius:20,alignSelf:"center"} : {})}
        onClick={function(e){ e.stopPropagation(); }}>
        <div style={S.modalHead}>
          <span style={{fontWeight:700,fontSize:17,color:B.verde,fontFamily:"Georgia,serif"}}>{props.pedido.nombre ? "Editar pedido" : "Nuevo pedido"}</span>
          <button onClick={props.onCerrar} style={{background:B.cremaMed,border:"none",borderRadius:10,width:36,height:36,display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",color:B.verdeMed}}><IcoX size={20} w={2}/></button>
        </div>

        <div style={S.modalBody}>
          <div style={S.grid2}>
            <Fld label="Fecha"><DatePicker value={p.fecha} onChange={function(v){ set("fecha", v); }}/></Fld>
            <Fld label="Taller">
              <select style={S.inp} value={p.taller} onChange={function(e){ set("taller", e.target.value); }}>
                {TALLERES.map(function(t){ return <option key={t}>{t}</option>; })}
              </select>
            </Fld>
          </div>
          <Fld label="Cliente"><input style={S.inp} value={p.nombre} onChange={function(e){ set("nombre", e.target.value); }}/></Fld>
          <Fld label="Direccion"><input style={S.inp} value={p.direccion} onChange={function(e){ set("direccion", e.target.value); }}/></Fld>
          <Fld label="Pedido"><textarea style={Object.assign({}, S.inp, {minHeight:58,resize:"vertical"})} value={p.pedido} onChange={function(e){ set("pedido", e.target.value); }}/></Fld>

// ═══════════ GANANCIAS ═══════════
function Ganancias(props){
  var split = props.split, setSplit = props.setSplit, desk = props.desk;
  var tot = split.ahorros + split.casa + split.personales;
  var ganTotal = props.pedidos.filter(function(p){ return normE(p.estado) === "Entregado"; })
                   .reduce(function(a,p){ return a + (Number(p.ganancia)||0); }, 0);
  var maxMes = Math.max.apply(null, props.porMes.concat([1]));
  var rep = {
    ahorros: ganTotal * (split.ahorros/100),
    casa: ganTotal * (split.casa/100),
    personales: ganTotal * (split.personales/100)
  };
  var cats = [["ahorros","Ahorros","#3b6cb7"],["casa","Casa","#b8860b"],["personales","Personales","#6b3b8a"]];

  return (
    <Wrap desk={desk}>
      <p style={{fontSize: desk?26:22,fontWeight:700,color:B.verde,fontFamily:"Georgia,serif",margin:"0 0 14px"}}>Ganancias</p>

      <div style={{background:B.verde,borderRadius:16,padding:"18px 20px",marginBottom:16}}>
        <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",fontWeight:600}}>Ganancia total del año (entregados)</div>
        <div style={{fontSize: desk?34:28,fontWeight:800,color:B.crema,letterSpacing:-0.5,marginTop:4}}>{fmt(ganTotal)}</div>
      </div>

      <p style={S.secTitle}>Reparto</p>
      <div style={{display: desk?"grid":"flex",gridTemplateColumns: desk?"repeat(3,1fr)":undefined,flexDirection: desk?undefined:"column",gap:10,marginBottom:8}}>
        {cats.map(function(c){
          var k = c[0], label = c[1], color = c[2];
          return (
            <div key={k} style={{display:"flex",alignItems:"center",padding:"12px 14px",background:B.crema,border:"1px solid "+B.cremaOsc,borderRadius:14}}>
              <div style={{width:8,height:36,borderRadius:6,background:color,marginRight:12}}/>
              <div style={{flex:1}}>
                <div style={{fontWeight:700,color:B.texto,fontSize:13}}>{label}</div>
                <div style={{fontSize:17,fontWeight:800,color:color}}>{fmt(rep[k])}</div>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:4}}>
                <input type="number" value={split[k]} onChange={function(e){
                    var ns = Object.assign({}, split);
                    ns[k] = Number(e.target.value);
                    setSplit(ns);
                  }}
                  style={{width:46,textAlign:"center",border:"1px solid "+B.cremaOsc,borderRadius:8,padding:"5px 3px",fontSize:14,fontWeight:700,color:B.verde,background:B.crema}}/>
                <span style={{color:B.textoSuave,fontWeight:700}}>%</span>
              </div>
            </div>
          );
        })}
      </div>
      {tot !== 100 ? <p style={{color:"#c0392b",fontSize:13,marginBottom:10}}>Los porcentajes suman {tot}% (deben ser 100%)</p> : null}

      <p style={S.secTitle}>Mes a mes</p>
      <div style={{display:"flex",flexDirection:"column",gap:8}}>
        {MESES.map(function(mes,i){
          var v = props.porMes[i];
          if(v === 0) return null;
          var t = tForVal(v, props.minV, props.maxV);
          var bg = gradColor(t), fg = gradText(t);
          var isMax = (v === props.maxV);
          var isMin = (v === props.minV && props.minV !== props.maxV);
          return (
            <div key={i} style={{display:"flex",alignItems:"center",gap:12,borderRadius:14,padding:"13px 18px",background:bg,
              border: "2px solid " + (isMax ? B.verdeOsc : (isMin ? "rgba(255,255,255,0.5)" : "transparent"))}}>
              <div style={{width:52,fontWeight:800,color:fg,fontSize:14}}>{mes}</div>
              <div style={{flex:1,height:7,background:"rgba(255,255,255,0.25)",borderRadius:8,overflow:"hidden"}}>
                <div style={{width:(v/maxMes*100)+"%",height:"100%",background:"rgba(255,255,255,0.5)",borderRadius:8}}/>
              </div>
              <div style={{display:"flex",alignItems:"center",gap:6}}>
                {isMax ? <span style={{fontSize:10,fontWeight:800,background:"rgba(255,255,255,0.3)",color:fg,padding:"2px 7px",borderRadius:10}}>MAX</span> : null}
                {isMin ? <span style={{fontSize:10,fontWeight:800,background:"rgba(0,0,0,0.15)",color:fg,padding:"2px 7px",borderRadius:10}}>MIN</span> : null}
                <div style={{minWidth:135,textAlign:"right",fontWeight:800,color:fg,fontSize:15}}>{fmt(v)}</div>
              </div>
            </div>
          );
        })}
      </div>
    </Wrap>
  );
}

// ═══════════ CALCULADORA ═══════════
function CalcPrecio(props){
  var dS = useState({material:"",combustible:"",otros:"",hM:1,hI:1,hC:1,hora:5000,margen:40});
  var d = dS[0], setD = dS[1];
  function set(k,v){ var nd = Object.assign({}, d); nd[k] = v; setD(nd); }
  function n(k){ return Number(d[k]) || 0; }
  var costoT = (n("hM") + n("hI") + n("hC")) * n("hora");
  var costoR = n("material") + n("combustible") + n("otros") + costoT;
  var precio = costoR * (1 + n("margen")/100);
  var gan = precio - costoR;

  return (
    <Wrap desk={props.desk}>
      <p style={{fontSize: props.desk?26:22,fontWeight:700,color:B.verde,fontFamily:"Georgia,serif",margin:"0 0 4px"}}>Calculadora</p>
      <p style={{color:B.textoSuave,fontSize:13,margin:"0 0 16px"}}>Para fundas, cortinas y decoracion</p>

      <div style={props.desk ? {display:"grid",gridTemplateColumns:"1fr 1fr",gap:16,alignItems:"start"} : {}}>
        <div style={{background:B.crema,border:"1px solid "+B.cremaOsc,borderRadius:16,padding:"16px 16px 4px",marginBottom:14}}>
          <Fld label="Costo del material / produccion"><input type="number" style={S.inp} value={d.material} onChange={function(e){ set("material", e.target.value); }} placeholder="0"/></Fld>
          <Fld label="Combustible"><input type="number" style={S.inp} value={d.combustible} onChange={function(e){ set("combustible", e.target.value); }} placeholder="0"/></Fld>
          <Fld label="Otros gastos"><input type="number" style={S.inp} value={d.otros} onChange={function(e){ set("otros", e.target.value); }} placeholder="0"/></Fld>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:8}}>
            <Fld label="Hs medicion"><input type="number" style={S.inp} value={d.hM} onChange={function(e){ set("hM", e.target.value); }}/></Fld>
            <Fld label="Hs instalac."><input type="number" style={S.inp} value={d.hI} onChange={function(e){ set("hI", e.target.value); }}/></Fld>
            <Fld label="Hs coord."><input type="number" style={S.inp} value={d.hC} onChange={function(e){ set("hC", e.target.value); }}/></Fld>
          </div>
          <div style={S.grid2}>
            <Fld label="Valor tu hora"><input type="number" style={S.inp} value={d.hora} onChange={function(e){ set("hora", e.target.value); }}/></Fld>
            <Fld label="Margen (%)"><input type="number" style={S.inp} value={d.margen} onChange={function(e){ set("margen", e.target.value); }}/></Fld>
          </div>
        </div>

        <div>
          <div style={{background:B.verde,borderRadius:16,padding:"16px 18px",marginBottom:14}}>
            <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.15)"}}>
              <span style={{color:"rgba(255,255,255,0.75)",fontSize:13}}>Costo del tiempo</span>
              <span style={{color:B.crema,fontWeight:600,fontSize:13}}>{fmt(costoT)}</span>
            </div>
            <div style={{display:"flex",justifyContent:"space-between",padding:"5px 0",borderBottom:"1px solid rgba(255,255,255,0.15)"}}>
              <span style={{color:"rgba(255,255,255,0.75)",fontSize:13,fontWeight:700}}>Costo total real</span>
              <span style={{color:B.crema,fontWeight:800,fontSize:15}}>{fmt(costoR)}</span>
            </div>
            <div style={{marginTop:12}}>
              <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                <span style={{color:"rgba(255,255,255,0.8)",fontSize:14,fontWeight:600}}>Precio sugerido</span>
                <span style={{color:B.crema,fontWeight:800,fontSize:22,letterSpacing:-0.5}}>{fmt(precio)}</span>
              </div>
              <div style={{display:"flex",justifyContent:"space-between"}}>
                <span style={{color:"rgba(255,255,255,0.8)",fontSize:14,fontWeight:600}}>Tu ganancia</span>
                <span style={{color:"#b8f0a0",fontWeight:800,fontSize:18}}>{fmt(gan)}</span>
              </div>
            </div>
          </div>
          <button onClick={function(){ props.onCrearPedido({total:Math.round(precio), costo:Math.round(costoR), ganancia:Math.round(gan)}); }}
            style={{display:"flex",alignItems:"center",justifyContent:"center",gap:6,width:"100%",background:B.crema,color:B.verde,border:"2px solid "+B.verde,padding:"13px",borderRadius:14,fontWeight:700,fontSize:15,cursor:"pointer",fontFamily:"Georgia,serif"}}>
            <IcoPlus size={17} w={2.5}/> Crear pedido con este precio
          </button>
        </div>
      </div>
    </Wrap>
  );
}

// ═══════════ CONFIGURACION ═══════════
function Config(props){
  var pedidos = props.pedidos, setPedidos = props.setPedidos, split = props.split, desk = props.desk;
  var msS = useState(""), msg = msS[0], setMsg = msS[1];
  var reS = useState(""), res = reS[0], setRes = reS[1];
  var fileRef = useRef(null);

  function bajar(contenido, nombre, tipo){
    var blob = new Blob([contenido], {type:tipo});
    var url = URL.createObjectURL(blob);
    var a = document.createElement("a");
    a.href = url; a.download = nombre;
    document.body.appendChild(a); a.click(); document.body.removeChild(a);
    setTimeout(function(){ URL.revokeObjectURL(url); }, 2000);
  }
  function hoy(){
    var d = new Date();
    var m = String(d.getMonth()+1); if(m.length < 2) m = "0"+m;
    var dd = String(d.getDate()); if(dd.length < 2) dd = "0"+dd;
    return d.getFullYear() + "-" + m + "-" + dd;
  }

  function bajarExcel(){
    function xesc(v){
      return String(v == null ? "" : v)
        .replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;")
        .replace(/"/g,"&quot;").replace(/'/g,"&apos;");
    }
    function txt(v){ return '<Cell><Data ss:Type="String">' + xesc(v) + '</Data></Cell>'; }
    function num(v){ return '<Cell ss:StyleID="mny"><Data ss:Type="Number">' + (Number(v)||0) + '</Data></Cell>'; }
    function hdr(v){ return '<Cell ss:StyleID="hdr"><Data ss:Type="String">' + xesc(v) + '</Data></Cell>'; }
    function fila(arr){ return "<Row>" + arr.join("") + "</Row>"; }

    var ordenados = pedidos.slice().sort(function(a,b){ return parseFecha(a.fecha) - parseFecha(b.fecha); });

    var colsE = ["FECHA","NOMBRE","DIRECCION","PEDIDO","TALLER","TELAS COMPRAR","SENAS","TOTAL","RESTO CONTRA ENTREGA","GANANCIAS","COSTO","ESTADO"];
    COSTOS.forEach(function(c){ colsE.push(c[1].toUpperCase()); });
    var filasE = ordenados.map(function(p){
      var celdas = [
        txt(p.fecha), txt(p.nombre), txt(p.direccion), txt(p.pedido),
        txt(p.taller), txt(p.telas),
        num(p.senas), num(p.total), num(p.resto), num(p.ganancia), num(p.costo),
        txt(normE(p.estado))
      ];
      COSTOS.forEach(function(c){
        var cc = p.costos || {};
        celdas.push(num(cc[c[0]]));
      });
      return fila(celdas);
    });

    var pA = split.ahorros/100, pC = split.casa/100, pP = split.personales/100;
    var colsC = ["CLIENTE","FECHA DE COBRO","GANANCIA","AHORROS "+split.ahorros+"%","CASA "+split.casa+"%","PERSONALES "+split.personales+"%","ESTADO"];
    var totalGan = 0;
    var filasC = ordenados.map(function(p){
      var g = Number(p.ganancia)||0;
      totalGan += g;
      return fila([txt(p.nombre), txt(p.fecha), num(g), num(g*pA), num(g*pC), num(g*pP), txt(normE(p.estado))]);
    });
    var totalRow = fila([
      '<Cell ss:StyleID="tot"><Data ss:Type="String">TOTAL</Data></Cell>',
      '<Cell ss:StyleID="tot"><Data ss:Type="String"></Data></Cell>',
      '<Cell ss:StyleID="totm"><Data ss:Type="Number">' + totalGan + '</Data></Cell>',
      '<Cell ss:StyleID="totm"><Data ss:Type="Number">' + (totalGan*pA) + '</Data></Cell>',
      '<Cell ss:StyleID="totm"><Data ss:Type="Number">' + (totalGan*pC) + '</Data></Cell>',
      '<Cell ss:StyleID="totm"><Data ss:Type="Number">' + (totalGan*pP) + '</Data></Cell>',
      '<Cell ss:StyleID="tot"><Data ss:Type="String"></Data></Cell>'
    ]);

    var xml = '<?xml version="1.0"?>\n<?mso-application progid="Excel.Sheet"?>\n' +
      '<Workbook xmlns="urn:schemas-microsoft-com:office:spreadsheet" xmlns:ss="urn:schemas-microsoft-com:office:spreadsheet">\n' +
      '<Styles>' +
        '<Style ss:ID="hdr"><Font ss:Bold="1" ss:Color="#F5F0E8"/><Interior ss:Color="#3D4F1C" ss:Pattern="Solid"/></Style>' +
        '<Style ss:ID="mny"><NumberFormat ss:Format="&quot;$&quot;#,##0.00"/></Style>' +
        '<Style ss:ID="tot"><Font ss:Bold="1"/><Interior ss:Color="#EDE7D9" ss:Pattern="Solid"/></Style>' +
        '<Style ss:ID="totm"><Font ss:Bold="1"/><Interior ss:Color="#EDE7D9" ss:Pattern="Solid"/><NumberFormat ss:Format="&quot;$&quot;#,##0.00"/></Style>' +
      '</Styles>\n' +
      '<Worksheet ss:Name="ENTREGAS 2026"><Table>' + fila(colsE.map(hdr)) + filasE.join("") + '</Table></Worksheet>\n' +
      '<Worksheet ss:Name="COBROS"><Table>' + fila(colsC.map(hdr)) + filasC.join("") + totalRow + '</Table></Worksheet>\n' +
      '</Workbook>';

    bajar(xml, "MC 2026 - " + hoy() + ".xls", "application/vnd.ms-excel;charset=utf-8;");
    setMsg("Excel descargado con las hojas ENTREGAS 2026 y COBROS.");
  }

  function bajarRespaldo(){
    bajar(JSON.stringify({pedidos:pedidos}, null, 2), "respaldo-muebles-chic-" + hoy() + ".json", "application/json");
    setMsg("Respaldo descargado. Guardalo en un lugar seguro.");
  }

  function restaurar(ev){
    var f = ev.target.files && ev.target.files[0];
    if(!f) return;
    var r = new FileReader();
    r.onload = function(e2){
      try{
        var d = JSON.parse(e2.target.result);
        var arr = d.length ? d : d.pedidos;
        if(!arr || !arr.length) throw new Error("formato");
        if(confirm("Vas a reemplazar los " + pedidos.length + " pedidos actuales por los " + arr.length + " del respaldo. Continuar?")){
          setPedidos(arr);
          setMsg("Respaldo restaurado: " + arr.length + " pedidos.");
        }
      }catch(err){ setMsg("El archivo no es un respaldo valido."); }
    };
    r.readAsText(f);
    ev.target.value = "";
  }

  function vaciar(){
    if(!confirm("Vas a borrar los " + pedidos.length + " pedidos cargados.\n\nBajaste el Excel antes? Si no, cancela y baja el respaldo primero.")) return;
    if(!confirm("Ultima confirmacion: esto no se puede deshacer.\n\nBorrar todo?")) return;
    setPedidos([]);
    setMsg("Listo. Empezas desde cero.");
  }

  function probarLectura(){
    setRes("Consultando el Sheet...");
    jsonpGet().then(function(obj){
      var n = (obj && obj.pedidos) ? obj.pedidos.length : 0;
      setRes(VERSION + " · LECTURA OK\nPedidos en el Sheet: " + n);
    }).catch(function(err){
      setRes(VERSION + " · ERROR DE LECTURA\n" + (err && err.message ? err.message : "desconocido"));
    });
  }
  function probarEscritura(){
    setRes("Enviando " + pedidos.length + " pedidos...");
    formPost({pedidos:pedidos, split:split}).then(function(){
      return new Promise(function(r){ setTimeout(r, 3000); });
    }).then(function(){
      return jsonpGet();
    }).then(function(obj){
      var n = (obj && obj.pedidos) ? obj.pedidos.length : 0;
      setRes(VERSION + " · Enviados: " + pedidos.length + "\nAhora en el Sheet: " + n +
        (n === pedidos.length ? "\n\nESCRITURA OK" : "\n\nLA ESCRITURA NO LLEGO"));
    }).catch(function(err){
      setRes(VERSION + " · ERROR AL ESCRIBIR\n" + (err && err.message ? err.message : "desconocido"));
    });
  }

  var btn = {flex:1,background:B.crema,color:B.verde,border:"1.5px solid "+B.verde,padding:"11px 8px",borderRadius:10,fontWeight:700,fontSize:13,cursor:"pointer"};
  var card = {background:B.blanco,border:"1px solid "+B.cremaOsc,borderRadius:16,padding:16,marginBottom:14};

  return (
    <Wrap desk={desk}>
      <p style={{fontSize: desk?26:22,fontWeight:700,color:B.verde,fontFamily:"Georgia,serif",margin:"0 0 16px"}}>Configuracion</p>

      <div style={desk ? {display:"grid",gridTemplateColumns:"1fr 1fr",gap:14,alignItems:"start"} : {}}>

        <div style={card}>
          <div style={S.cardTitle}>Sena por defecto</div>
          <p style={{fontSize:12.5,color:B.textoSuave,margin:"0 0 10px"}}>Porcentaje que se calcula solo al cargar el total de un pedido.</p>
          <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
            {[40,50,60,70,100].map(function(v){
              return (
                <button key={v} onClick={function(){ props.setPctSena(v); }}
                  style={{padding:"9px 16px",borderRadius:20,border:"none",cursor:"pointer",fontSize:13,fontWeight:700,
                    background: props.pctSena===v ? B.verde : B.cremaMed,
                    color: props.pctSena===v ? B.crema : B.verdeMed}}>{v}%</button>
              );
            })}
            <div style={{display:"flex",alignItems:"center",gap:4,background:B.crema,border:"1px solid "+B.cremaOsc,borderRadius:20,padding:"4px 12px"}}>
              <input type="number" value={props.pctSena} onChange={function(e){ props.setPctSena(Number(e.target.value)||0); }}
                style={{width:42,border:"none",outline:"none",fontSize:14,fontWeight:700,color:B.verde,textAlign:"center",background:"none"}}/>
              <span style={{color:B.textoSuave,fontWeight:700,fontSize:13}}>%</span>
            </div>
          </div>
        </div>

        <div style={card}>
          <div style={S.cardTitle}>Vista</div>
          <p style={{fontSize:12.5,color:B.textoSuave,margin:"0 0 10px"}}>Cambia entre pantalla ancha (computadora) y angosta (tablet o celular).</p>
          <button onClick={props.toggleDesk}
            style={{display:"flex",alignItems:"center",justifyContent:"center",gap:8,width:"100%",background:B.verde,color:B.crema,border:"none",borderRadius:10,padding:"12px",fontWeight:700,fontSize:13.5,cursor:"pointer"}}>
            {desk ? <IcoTablet size={16} w={2}/> : <IcoMonitor size={16} w={2}/>}
            {desk ? "Cambiar a vista tablet" : "Cambiar a vista computadora"}
          </button>
        </div>

        <div style={card}>
          <div style={S.cardTitle}>Respaldo de tus datos</div>
          <div style={{display:"flex",gap:8,marginBottom:8}}>
            <button onClick={bajarExcel} style={btn}>Bajar Excel</button>
            <button onClick={bajarRespaldo} style={btn}>Bajar respaldo</button>
          </div>
          <button onClick={function(){ if(fileRef.current) fileRef.current.click(); }}
            style={Object.assign({}, btn, {width:"100%",background:B.cremaMed,border:"1px solid "+B.cremaOsc,color:B.verdeMed})}>Restaurar desde respaldo</button>
          <input ref={fileRef} type="file" accept=".json,application/json" onChange={restaurar} style={{display:"none"}}/>
          <button onClick={vaciar}
            style={Object.assign({}, btn, {width:"100%",marginTop:8,background:"#fdf0f0",border:"1px solid #e8c4c4",color:"#a03028"})}>Borrar todos los pedidos</button>
          {msg ? <div style={{fontSize:11.5,color:B.verdeMed,marginTop:10,fontWeight:600}}>{msg}</div> : null}
        </div>

        <div style={card}>
          <div style={S.cardTitle}>Sincronizacion ({VERSION})</div>
          <div style={{display:"flex",gap:8}}>
            <button onClick={probarLectura} style={Object.assign({}, btn, {background:B.verde,color:B.crema,border:"none"})}>Probar lectura</button>
            <button onClick={probarEscritura} style={Object.assign({}, btn, {background:B.verdeMed,color:B.crema,border:"none"})}>Probar escritura</button>
          </div>
          {res ? <pre style={{whiteSpace:"pre-wrap",wordBreak:"break-all",fontSize:11.5,color:B.texto,background:B.crema,padding:11,borderRadius:8,marginTop:10,marginBottom:0,fontFamily:"monospace"}}>{res}</pre> : null}
        </div>

      </div>
    </Wrap>
  );
}

// ═══════════ ESTILOS ═══════════
var S = {
  app:        {fontFamily:"system-ui,-apple-system,sans-serif",height:"100%",display:"flex",flexDirection:"column",background:B.cremaMed,maxWidth:680,margin:"0 auto"},
  header:     {padding:"14px 18px 12px",background:B.verde},
  logoBadge:  {width:40,height:40,borderRadius:10,background:"rgba(255,255,255,0.18)",display:"flex",alignItems:"center",justifyContent:"center",fontSize:15,fontWeight:900,color:B.crema,fontFamily:"Georgia,serif",letterSpacing:1,flexShrink:0},
  logoText:   {fontSize:17,fontWeight:900,color:B.crema,fontFamily:"Georgia,serif",letterSpacing:2},
  body:       {flex:1,overflow:"hidden",display:"flex"},
  scroll:     {flex:1,overflowY:"auto",padding:"18px 16px 90px",fontFamily:"system-ui,-apple-system,sans-serif"},
  nav:        {display:"flex",background:B.verde,paddingBottom:6},
  secTitle:   {fontSize:13,fontWeight:800,color:B.verde,textTransform:"uppercase",letterSpacing:1,margin:"0 0 10px",fontFamily:"Georgia,serif"},
  cardTitle:  {fontSize:12.5,fontWeight:800,color:B.verde,textTransform:"uppercase",letterSpacing:0.8,marginBottom:10,fontFamily:"Georgia,serif"},
  miniCard:   {padding:"14px",borderRadius:16,background:B.crema,border:"1px solid "+B.cremaOsc,cursor:"pointer",textAlign:"center"},
  itemCard:   {display:"flex",alignItems:"center",width:"100%",padding:"12px 14px",background:B.blanco,border:"1px solid "+B.cremaOsc,borderRadius:14,marginBottom:8,cursor:"pointer"},
  searchBox:  {display:"flex",alignItems:"center",gap:8,background:B.blanco,border:"1px solid "+B.cremaOsc,borderRadius:12,padding:"10px 14px",marginBottom:10},
  searchInput:{border:"none",outline:"none",flex:1,fontSize:15,background:"none",color:B.texto},
  chip:       {border:"none",padding:"6px 13px",borderRadius:20,fontSize:12.5,fontWeight:700,cursor:"pointer",whiteSpace:"nowrap"},
  pedCard:    {display:"flex",alignItems:"center",width:"100%",padding:"14px",background:B.blanco,border:"1px solid "+B.cremaOsc,borderRadius:16,marginBottom:10,cursor:"pointer"},
  addBtn:     {display:"flex",alignItems:"center",gap:5,background:B.crema,color:B.verde,border:"1.5px solid "+B.verde,padding:"9px 15px",borderRadius:12,fontWeight:700,fontSize:13.5,cursor:"pointer"},
  modalBg:    {position:"fixed",top:0,left:0,right:0,bottom:0,background:"rgba(0,0,0,0.45)",display:"flex",alignItems:"flex-end",justifyContent:"center",zIndex:50},
  modal:      {background:B.cremaMed,width:"100%",maxWidth:680,maxHeight:"92vh",borderRadius:"22px 22px 0 0",display:"flex",flexDirection:"column"},
  modalHead:  {display:"flex",justifyContent:"space-between",alignItems:"center",padding:"18px 20px 12px",borderBottom:"1px solid "+B.cremaOsc},
  modalBody:  {padding:"16px 20px",overflowY:"auto",flex:1},
  inp:        {width:"100%",boxSizing:"border-box",border:"1px solid "+B.cremaOsc,borderRadius:10,padding:"10px 12px",fontSize:15,outline:"none",background:B.blanco,fontFamily:"inherit",color:B.texto},
  grid2:      {display:"grid",gridTemplateColumns:"1fr 1fr",gap:10},
  calNav:     {background:B.cremaMed,border:"none",borderRadius:10,width:36,height:36,fontSize:18,color:B.verde,cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"}
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
